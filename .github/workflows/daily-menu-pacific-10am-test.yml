# 프로덕션 daily-menu.yml 과 별도 — Slack/스크래핑 동작만 같은 시각에 검증용.
# UTC 17:05 ≈ America/Los_Angeles 10:05(PDT). PST 겨울에는 약 9:05 로컬.
name: Daily menu Slack test (~10am Pacific)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '5 17 * * *'

permissions:
  contents: read

concurrency:
  group: daily-menu-pacific-10am-test-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 및 Slack 메시지 전송 (테스트 워크플로)
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MENU_DATE_TZ: America/Los_Angeles
        run: |
          python main.py
