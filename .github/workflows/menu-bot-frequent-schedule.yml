# 수동 실행은 항상 가능합니다.
# GitHub 정책: schedule 은 최소 5분 간격만 허용(* * * * * 매분 불가).
#   https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onschedule
# 실행 시각은 "베스트 에포트" — 부하 시 수십 분~수시간 밀릴 수 있음(랜덤이 아니라 큐 지연).
#   https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
# schedule 을 끄려면 아래 schedule 블록을 주석 처리하세요.

name: Cafeteria menu bot (manual / optional every-5-min cron)

on:
  # schedule:
  #   # 분 시 일 월 요일(UTC). */5 = 큐에 넣을 수 있는 5분 격자; 실제 러너 할당은 지연될 수 있음.
  #   - cron: '*/5 * * * *'
  # workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: menu-bot-fast-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python main.py
