# 수동 실행은 항상 가능합니다.
# GitHub 정책: schedule 워크플로는 최소 5분 간격만 허용됩니다(* * * * * 매분은 동작하지 않음).
#   https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onschedule
# 테스트: LA 로컬 매일 14:27(오후 2:27). 오전 2:27이면 cron 시를 2. 끝나면 schedule 주석 또는 */5 복구.

name: Cafeteria menu bot (manual / optional every-5-min cron)

on:
  # schedule 을 workflow_dispatch 앞에 두면 등록이 안정적인 경우가 있습니다.
  schedule:
    # 분 시 일 월 요일 — 아래 timezone 기준. 오전 2:27이면 '27 2 * * *'.
    - cron: '28 14 * * *'
      timezone: America/Los_Angeles
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: menu-bot-fast-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python main.py
