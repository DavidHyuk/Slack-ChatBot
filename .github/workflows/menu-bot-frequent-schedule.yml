# 수동 실행은 항상 가능합니다.
# GitHub 정책: schedule 워크플로는 최소 5분 간격만 허용됩니다(* * * * * 매분은 동작하지 않음).
#   https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions#onschedule
# 아래 schedule 을 켠 뒤 커밋하면 최대 5분마다 실행됩니다. 끝나면 schedule 을 주석 처리하세요.

name: Cafeteria menu bot (manual / optional every-5-min cron)

on:
  workflow_dispatch:
  # 짧은 간격 테스트: GitHub 최소 5분 — 아래 두 줄 주석 해제 후 커밋
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read

concurrency:
  group: menu-bot-fast-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python main.py
