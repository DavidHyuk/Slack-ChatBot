# 수동 실행은 항상 가능합니다.
# 매 1분 자동 실행이 필요하면 아래 schedule 블록의 주석을 해제한 뒤 커밋하세요.
# 테스트가 끝나면 schedule 부분을 다시 주석 처리하는 것을 권장합니다(Actions 실행·Slack 알림 과다 방지).

name: Cafeteria menu bot (manual / optional every-minute cron)

on:
  workflow_dispatch:
  schedule:
    - cron: '* * * * *'

permissions:
  contents: read

concurrency:
  group: menu-bot-fast-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python main.py
