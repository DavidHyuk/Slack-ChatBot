name: Daily Cafeteria Menu SlackBot

on:
  schedule:
    # UTC 15:05 ≈ America/Los_Angeles 8:05(PDT) / 7:05(PST). 로컬 시각 검사 없음 — 실행되면 곧바로 Slack 전송.
    # 겨울에도 로컬 8시에 맞추려면 `5 16 * * *` 등으로 바꾸세요(일광절약제와 트레이드오프).
    - cron: '5 15 * * *'

  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-menu-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # 패키지 캐싱
          
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # {date} in TARGET_URL is resolved with MENU_DATE_TZ (IANA), not the runner's UTC date.
      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MENU_DATE_TZ: America/Los_Angeles
        run: |
          python main.py
