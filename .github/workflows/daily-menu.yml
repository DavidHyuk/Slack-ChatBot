name: Daily Cafeteria Menu SlackBot

on:
  schedule:
    # 매일 평일(월~금) KST 오전 11시에 실행 (UTC 기준 오전 2시)
    # 분 시 일 월 요일
    - cron: '0 2 * * 1-5'
  
  # 수동으로 워크플로우를 실행할 수 있도록 허용
  workflow_dispatch:

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # 패키지 캐싱
          
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: |
          python main.py
