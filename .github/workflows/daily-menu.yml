name: Daily Cafeteria Menu SlackBot

on:
  schedule:
    # UTC 14:30 ≈ America/Los_Angeles 7:30 when on daylight time (PDT). 겨울(PST)에는 약 6:30 로컬.
    # 실험 결과 셋업 시간으로부터 1시간 16분 뒤 github action 동작함. 8시 45~46분쯤 동작 예정
    # 1-5: Mon–Fri in UTC. 이 시각(14:30 UTC)은 LA에서도 같은 캘린더 날·요일(월~금)이므로 토/일(로컬)에는 실행되지 않음.
    - cron: '30 14 * * 1-5'

  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-menu-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # {date} in TARGET_URL is resolved with MENU_DATE_TZ (IANA), not the runner's UTC date.
      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MENU_DATE_TZ: America/Los_Angeles
        run: |
          python main.py
