name: Daily Cafeteria Menu SlackBot

on:
  schedule:
    # America/Los_Angeles 오전 8시: PDT→15:xx UTC, PST→16:xx UTC. 두 번 돌린 뒤 main에서 해당 타임존 8시만 실제 전송.
    - cron: '5 15,16 * * *'

  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-menu-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # 패키지 캐싱
          
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          ENFORCE_LOCAL_NOTIFY_WINDOW: "1"
          MENU_NOTIFY_TZ: America/Los_Angeles
          MENU_NOTIFY_HOUR: "8"
          MENU_DATE_TZ: America/Los_Angeles
        run: |
          python main.py
