name: Daily Cafeteria Menu SlackBot

on:
  schedule:
    # `timezone` + cron: 월~금 07:30 America/Los_Angeles (IANA). 요일·시·분은 모두 LA 기준.
    # 이전(UTC 14:30 고정)은 겨울엔 로컬 약 06:30에 가깝게 돌았음; 이제 연중 로컬 07:30에 맞춤.
    # GitHub schedule은 best-effort 지연이 있을 수 있음. 실험상 액션 시작이 수십 분 늦을 수 있음.
    - cron: '30 7 * * 1-5'
      timezone: "America/Los_Angeles"

  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-menu-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # {date} in TARGET_URL is resolved with MENU_DATE_TZ (IANA), not the runner's UTC date.
      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MENU_DATE_TZ: America/Los_Angeles
        run: |
          python main.py
