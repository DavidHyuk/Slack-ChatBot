name: Daily Cafeteria Menu SlackBot

on:
  schedule:
    # UTC 15:05 ≈ America/Los_Angeles 8:05 when on daylight time (PDT). 겨울(PST)에는 약 7:05 로컬.
    - cron: '5 15 * * *'

  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: daily-menu-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  send-menu-to-slack:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # {date} in TARGET_URL is resolved with MENU_DATE_TZ (IANA), not the runner's UTC date.
      - name: 스크래핑 및 Slack 메시지 전송
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          MENU_DATE_TZ: America/Los_Angeles
        run: |
          python main.py
